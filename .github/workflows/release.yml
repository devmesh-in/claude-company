name: Release

on:
  release:
    types: [published]

# Trusted Publishing (OIDC): no npm token exists anywhere. id-token: write lets
# this workflow authenticate to npm as itself; npm must list this repo+workflow
# as a trusted publisher for the package (npmjs.com -> package -> Settings ->
# Trusted Publisher: GitHub Actions, devmesh-in/claude-company, release.yml).
# Provenance attestation is automatic with trusted publishing.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish to npm with provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; Node 20 bundles an older npm.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest && npm --version

      # Never publish red: the same gates CI runs must pass here too.
      - name: CLI wrapper tests
        run: bash tests/cli/test_cli.sh
      - name: Installer TUI tests
        run: bash tests/install/test_tui.sh
      - name: Installer + gates tests
        run: bash tests/install/run_tests.sh
      - name: Hook tests
        run: bash tests/hooks/run_tests.sh

      - name: Verify release tag matches package.json version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "release tag: $TAG   package.json version: $PKG_VERSION"
          if [ "$TAG" != "v$PKG_VERSION" ]; then
            echo "ERROR: release tag '$TAG' does not match package.json version 'v$PKG_VERSION'." >&2
            echo "Bump the version in package.json to match the tag (or retag) before releasing." >&2
            exit 1
          fi
          echo "ok: tag matches package.json version"

      - name: Publish (Trusted Publishing - OIDC, no token)
        env:
          AUTHORIZED: "1"
        run: npm publish --access public

      - name: Publish summary
        run: |
          set -euo pipefail
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "Published claude-company@${PKG_VERSION} to npm with provenance."
          echo "Try it: npx claude-company@${PKG_VERSION} install ."
